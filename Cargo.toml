[package]
name = "component-crypto"
description = "Cryptographic hashing, HMAC, and JWT decoding"
version = "0.1.0"
edition = "2024"

[dependencies]
act-sdk = { version = "0.2", path = "../../act-sdk-rs/act-sdk" }
wit-bindgen = { version = "0.54", features = ["async-spawn"] }
sha2 = "0.10"
sha3 = "0.10"
hmac = "0.12"
hex = "0.4"
serde_json = "1"
base64 = "0.22"

[profile.release]
lto = "fat"
codegen-units = 1
strip = true
opt-level = "z"

[lib]
crate-type = ["cdylib"]
